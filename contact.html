<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prayag Engineering - Mechanical Fabrication, Erection & Maintenance Services</title>
  <meta name="description" content="Prayag Engineering specializes in heavy structural fabrication, mechanical erection, industrial piping, and maintenance for power, oil & gas, and process industries." />
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <style>
    /* =========================
       THEME & PARALLAX VARIABLES
       ========================= */
    :root {
      --navy: #0b2545;
      --steel: #2f3a45;
      --muted: #9ca3af;
      --accent: #ff7a18;
      --white: #ffffff;
      --bg: #071021;
      --glass: rgba(255, 255, 255, 0.05);
      --max-width: 1200px;
      --transition: 400ms cubic-bezier(0.2, 0.9, 0.3, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--white);
      background-color: var(--bg);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Remove default underlines globally */

    a {
      text-decoration: none;
      color: inherit;
    }

    /* =========================
       HERO SLIDER
       ========================= */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .slider-container {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition:
        opacity 1.5s ease-in-out,
        transform 6s linear;
      background-size: cover;
      background-position: center;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1.1);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
          rgba(7, 16, 33, 0.9),
          rgba(7, 16, 33, 0.2));
      z-index: 1;
    }

    /* =========================
       NAVIGATION & CLICK EFFECTS
       ========================= */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background-color: var(--navy);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      z-index: 101;
      letter-spacing: 1px;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }

    header {
      position: fixed;
      top: 40px;
      width: 100%;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(11, 37, 69, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
    }

    nav ul {
      display: flex;
      gap: 32px;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    nav a {
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: var(--transition);
      position: relative;
      padding: 10px 0;
    }

    /* SLIDING UNDERLINE EFFECT */
    nav a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      bottom: 0;
      left: 0;
      background-color: var(--accent);
      transition: width 0.3s ease;
    }

    nav a:hover {
      color: var(--accent);
    }

    nav a:hover::after {
      width: 100%;
    }

    /* CLICK EFFECT (The "Pulse" and Scale) */
    nav a:active {
      transform: scale(0.9);
      color: var(--accent);
      transition: transform 0.1s;
    }

    .cta {
      background: var(--accent);
      color: #fff;
      padding: 12px 26px;
      border-radius: 4px;
      font-weight: 700;
      transition: var(--transition);
      display: inline-block;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 122, 24, 0.3);
    }

    .cta:active {
      transform: scale(0.95);
    }

    /* =========================
       SECTIONS
       ========================= */
    .goal-section {
      padding: 120px 0;
      background:
        linear-gradient(rgba(11, 37, 69, 0.9), rgba(11, 37, 69, 0.9)),
        url("assets/images/goal-bg.jpg");
      background-attachment: fixed;
      background-size: cover;
      text-align: center;
    }

    .goal-card {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--glass);
      border-radius: 16px;
    }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-top: 50px;
    }

    .work-step {
      padding: 40px;
      background: var(--glass);
      border-radius: 12px;
      position: relative;
      transition: var(--transition);
      border-bottom: 3px solid transparent;
    }

    .work-step:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      transform: translateY(-10px);
    }

    .step-num {
      font-size: 48px;
      font-weight: 900;
      color: rgba(255, 122, 24, 0.1);
      position: absolute;
      top: 10px;
      right: 20px;
    }

    .work-icon {
      font-size: 40px;
      margin-bottom: 20px;
      display: block;
    }

    section {
      padding: 100px 0;
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 800ms ease-out;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .services-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .service-card {
      background: var(--glass);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: var(--transition);
    }

    .service-card:hover {
      background: var(--steel);
      transform: translateY(-5px);
    }

    /* CONTACT GRID (KEEPING ORIGINAL LOGIC) */
    .contact-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr;
    }

    .contact-card {
      background: linear-gradient(180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.01));
      padding: 18px;
      border-radius: 12px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: transparent;
      color: var(--white);
      outline: none;
      transition: 0.3s;
    }

    select option {
      background-color: #0f172a;
      color: #ffffff;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
    }

    @media (min-width: 1024px) {
      .contact-grid {
        grid-template-columns: 1fr 360px;
      }
    }

    @media (max-width: 768px) {
      nav ul {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 80px;
        left: 0;
        width: 100%;
        background: var(--navy);
        padding: 20px 0;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      nav ul.nav-active {
        display: flex;
      }

      .menu-toggle {
        display: block !important;
      }

      .cta {
        display: none !important;
      }
    }

    .work-list, .service-list {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      text-align: left;
    }
    
    .industries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .industry-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: var(--transition);
    }

    .industry-card:hover {
      background: var(--steel);
      border-color: var(--accent);
      transform: translateY(-5px);
    }

    .choose-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .choose-item {
      background: rgba(255, 122, 24, 0.05);
      border-left: 4px solid var(--accent);
      padding: 15px 20px;
      font-weight: 600;
      border-radius: 0 8px 8px 0;
      text-align: left;
    }

    .floating-actions {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 999;
    }

    .float-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }

    .float-btn:hover {
      transform: scale(1.1);
    }

    .float-btn.wa {
      background-color: #25D366;
    }

    .premium-card {
      background: linear-gradient(to bottom, rgba(11,37,69,0.9), rgba(11,37,69,0.95)), url('assets/images/industrial_bg.png') center/cover;
      border: 1px solid rgba(255,122,24,0.1);
      padding: 40px 20px;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }
    .premium-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,122,24,0.05);
      opacity: 0;
      transition: 0.4s;
    }
    .premium-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }
    .premium-card:hover::before { opacity: 1; }
    .premium-card .card-icon {
      font-size: 40px;
      margin-bottom: 15px;
      z-index: 1;
    }
    .premium-card h3 {
      font-size: 16px;
      margin: 0;
      z-index: 1;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .hero-content {
        margin-top: 60px;
        text-align: center;
      }
      .hero-box {
        padding: 30px 20px !important;
        margin: 0 15px !important;
      }
      h1.hero-title {
        font-size: 36px !important;
      }
      .top-bar { font-size: 11px; padding: 0 10px; }
      .nav-inner .logo span { display: none; } /* Hide text on small screens */
      .services-grid, .industries-grid, .work-grid, .choose-grid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>

<body>
  <div class="top-bar">
    GSTIN: <span id="configGstin"></span> &nbsp;|&nbsp; <span id="configTagline"></span>
  </div>
  <header>
    <div class="container nav-inner">

  <main>
<div style="height:120px; background:rgba(11, 37, 69, 0.9);"></div><section id="contact" style="background: rgba(11, 37, 69, 0.3)">

</main>

  <footer style="
        padding: 40px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        text-align: center;
        font-size: 13px;
        color: var(--muted);
      ">
    <div style="margin-bottom: 20px;">
      <img src="assets/images/pg_logo.png" alt="Prayag Engineering" style="height: 40px; opacity: 0.7; filter: grayscale(100%);">
    </div>
    <p>
      © <span id="configYear"></span> <span id="configFooterText"></span>
    </p>
  </footer>

      <script src="assets/config.js"></script>
  <script>
    const safeSetText = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };
    const safeSetSrc = (id, src) => { const el = document.getElementById(id); if (el) el.src = src; };

    safeSetText("configGstin", siteConfig.topBar.gstin);
    safeSetText("configTagline", siteConfig.topBar.text);
    safeSetText("configYear", siteConfig.footer.year);
    safeSetText("configFooterText", siteConfig.footer.text);
    safeSetSrc("configMap", siteConfig.contact.mapEmbedUrl);

    const slider = document.getElementById("heroSlider");
    if (slider) {
      siteConfig.heroImages.forEach((img, idx) => {
        const div = document.createElement("div");
        div.className = `slide ${idx === 0 ? "active" : ""}`;
        div.style.backgroundImage = `url('${img}')`;
        slider.appendChild(div);
      });
      let currentSlide = 0;
      setInterval(() => {
        const slides = document.querySelectorAll(".slide");
        if(slides.length > 0) {
          slides[currentSlide].classList.remove("active");
          currentSlide = (currentSlide + 1) % slides.length;
          slides[currentSlide].classList.add("active");
        }
      }, 5000);
    }

    const sGrid = document.getElementById("servicesGrid");
    const userServiceSelect = document.getElementById("userService");
    
    siteConfig.services.forEach((s) => {
      if (sGrid) {
        sGrid.innerHTML += `<div class="service-card reveal" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
  <div style="height: 220px; background: url('${s.img || "assets/images/industrial_bg.png"}') center/cover; position: relative;">
    <div style="position: absolute; inset: 0; background: linear-gradient(to top, var(--glass), transparent);"></div>
  </div>
  <div style="padding: 30px; flex: 1; display: flex; flex-direction: column;">
    <h3 style="margin-bottom:10px; font-weight:800; font-size: 20px; color: var(--accent);">${s.title}</h3>
    <p style="color:var(--muted); font-size:14px; margin-bottom: 20px; line-height: 1.6;">${s.shortDesc || ""}</p>
    <div style="flex: 1;">${s.desc}</div>
    <a href="contact.html" class="cta" style="margin-top: 25px; text-align: center; width: 100%; display: block; border: 1px solid var(--accent); background: transparent; color: var(--accent);">Consult Now</a>
  </div>
</div>`;
      }
      if (userServiceSelect) {
        const opt = document.createElement("option");
        opt.value = s.title;
        opt.textContent = s.title;
        userServiceSelect.appendChild(opt);
      }
    });

    safeSetText("contactPhone", siteConfig.contact.phone);
    safeSetText("contactEmail", siteConfig.contact.email);
    safeSetText("contactAddress", siteConfig.contact.address);

    const observer = new IntersectionObserver(
      (entries) => { entries.forEach((entry) => { if (entry.isIntersecting) entry.target.classList.add("visible"); }); },
      { threshold: 0.1 }
    );
    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));

    const mobileMenuBtn = document.getElementById("mobileMenuBtn");
    const navMenu = document.getElementById("navMenu");
    if (mobileMenuBtn && navMenu) {
      mobileMenuBtn.addEventListener("click", () => navMenu.classList.toggle("nav-active"));
      navMenu.querySelectorAll("a").forEach((link) => link.addEventListener("click", () => navMenu.classList.remove("nav-active")));
    }

    const contactForm = document.getElementById("contactForm");
    if (contactForm) {
      let captchaNum1 = 0, captchaNum2 = 0;
      function generateCaptcha() {
        captchaNum1 = Math.floor(Math.random() * 10) + 1;
        captchaNum2 = Math.floor(Math.random() * 10) + 1;
        document.getElementById("captchaQuestion").innerText = `${captchaNum1} + ${captchaNum2} =`;
        document.getElementById("captchaAnswer").value = "";
      }
      generateCaptcha();

      const formStatus = document.getElementById("formStatus");
      const submitBtn = document.getElementById("submitBtn");

      contactForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const userAnswer = parseInt(document.getElementById("captchaAnswer").value, 10);
        if (userAnswer !== captchaNum1 + captchaNum2) {
          formStatus.style.display = "block"; formStatus.style.color = "#ff4444";
          formStatus.innerText = "Incorrect CAPTCHA answer. Please try again.";
          generateCaptcha(); return;
        }

        formStatus.style.display = "block"; formStatus.style.color = "#4caf50";
        formStatus.innerText = "Sending message...";
        submitBtn.disabled = true; submitBtn.innerText = "Sending...";

        const targetEmail = "engineeringprayag33+hr@gmail.com";
        const payload = {
          name: document.getElementById("userName").value, company: document.getElementById("userCompany").value,
          email: document.getElementById("userEmail").value, phone: document.getElementById("userPhone").value,
          service: document.getElementById("userService").value, message: document.getElementById("userMessage").value,
          _subject: "New Website Form Submission!"
        };

        fetch(`https://formsubmit.co/ajax/${targetEmail}`, {
          method: "POST", headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
          formStatus.style.color = "#4caf50"; formStatus.innerText = "Message sent successfully!";
          contactForm.reset(); generateCaptcha(); submitBtn.disabled = false; submitBtn.innerText = "Submit Request";
        })
        .catch(error => {
          formStatus.style.color = "#ff4444"; formStatus.innerText = "Network error. Failed to send message.";
          generateCaptcha(); submitBtn.disabled = false; submitBtn.innerText = "Submit Request";
        });
      });
    }
  </script>

  <!-- Floating Actions -->
  <div class="floating-actions">
